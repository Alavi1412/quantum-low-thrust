run:
  label: hard_catalog_locked_nominal_recovery
  output_subdir: hard_catalog_locked_nominal_recovery
  evidence_level: "hard catalog-DRO locked-nominal continuous branch-recovery diagnostic baseline; not quantum evidence"
benchmark:
  mu: 0.01215058560962404
  target_mode: catalog_dro_phase
  transfer_time: 4.0
  segments: 14
  substeps_per_segment: 7
  amax: 1.0
  steering:
    kr: 0.75
    kv: 1.45
objective:
  position_scale: 1.0
  velocity_scale: 0.35
  weights:
    nominal: 1.0
    robust_worst: 0.85
    robust_degradation: 0.55
    active_fraction: 0.08
    smoothness: 0.04
  thresholds:
    nominal_success: 0.09
    robust_success: 0.17
outages:
  block_lengths: [1, 2]
locked_recovery:
  runtime_budget_seconds: 1800
  min_recovery_segments: 4
  nominal:
    max_nfev: 140
    node_initialization: linear
    node_initialization_blend: 0.5
    residual_weights:
      initial: 10.0
      defect: 1.0
      terminal: 4.0
      branch_terminal: 4.0
      branch_start: 5.0
      control: 0.01
      smooth: 0.01
  branch:
    max_nfev: 120
    xtol: 1.0e-5
    ftol: 1.0e-5
    gtol: 1.0e-5
    weights:
      terminal: 4.0
      control: 0.01
      smooth: 0.01
      continuity: 0.0
  cases:
    - case_id: locked_hard_nominal_only
      purpose: "Hard catalog-DRO feasible locked nominal trajectory; selected_worst_error equals nominal_error by construction."
      transfer_time: 4.0
      amax: 1.0
      segments: 14
      selected_outages: 0
      nominal_max_nfev: 140
      branch_max_nfev: 0
    - case_id: locked_hard_selected1
      purpose: "Hard catalog-DRO locked-nominal recovery for the single hardest eligible missed-thrust mask."
      transfer_time: 4.0
      amax: 1.0
      segments: 14
      selected_outages: 1
      nominal_max_nfev: 140
      branch_max_nfev: 120
    - case_id: locked_hard_selected3
      purpose: "Hard catalog-DRO locked-nominal recovery for the three hardest eligible missed-thrust masks."
      transfer_time: 4.0
      amax: 1.0
      segments: 14
      selected_outages: 3
      nominal_max_nfev: 140
      branch_max_nfev: 120
    - case_id: locked_hard_single_min6_selected8
      purpose: "Hard catalog-DRO locked-nominal recovery for the 8 hardest one-segment masks with at least six remaining recovery segments; explicitly not late-outage or two-segment robustness."
      outage_lengths: [1]
      selected_outages: 8
      min_recovery_segments: 6
      transfer_time: 4.0
      amax: 1.0
      segments: 14
      nominal_max_nfev: 140
      branch_max_nfev: 120
    - case_id: locked_hard_all_single
      purpose: "Hard catalog-DRO locked-nominal recovery for all one-segment missed-thrust masks; explicitly not two-segment robustness."
      transfer_time: 4.0
      amax: 1.0
      segments: 14
      selected_outages: all_single
      nominal_max_nfev: 140
      branch_max_nfev: 120
