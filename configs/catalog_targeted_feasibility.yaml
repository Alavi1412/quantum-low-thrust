run:
  label: catalog_targeted_feasibility_branch_recovery
  output_subdir: catalog_targeted_feasibility
  evidence_level: "targeted catalog-DRO feasibility exploration; non-constructed target with stronger disclosed branch-recovery multistart settings; success thresholds inherited from q1_candidate and not relaxed"
benchmark:
  mu: 0.01215058560962404
  target_mode: catalog_dro_phase
  transfer_time: 4.0
  segments: 14
  substeps_per_segment: 7
  amax: 0.3
  steering:
    kr: 0.75
    kv: 1.45
objective:
  position_scale: 1.0
  velocity_scale: 0.35
  weights:
    nominal: 1.0
    robust_worst: 0.85
    robust_degradation: 0.55
    active_fraction: 0.08
    smoothness: 0.04
  thresholds:
    nominal_success: 0.09
    robust_success: 0.17
outages:
  block_lengths: [1, 2]
experiments:
  seeds: [11, 23, 37]
  solver_true_budget: 48
  equal_total_budget: true
  qubo_train_samples: 72
  qubo_validation_fraction: 0.25
  top_refine_per_method: 1
  save_top_schedules: 5
solvers:
  random:
    samples: 48
  cem:
    iterations: 8
    batch_size: 12
    elite_fraction: 0.25
    smoothing: 0.65
  genetic:
    population: 20
    generations: 6
    elite: 4
    mutation_rate: 0.08
  true_sa:
    steps: 48
    temp0: 0.25
    temp_min: 0.01
  surrogate_sa:
    steps: 420
    candidates_to_evaluate: 48
    temp0: 0.35
    temp_min: 0.004
  qaoa:
    p: 1
    angle_trials: 14
    sample_count: 240
    candidates_to_evaluate: 48
baselines:
  all_windows_continuous:
    enabled: true
refinement:
  mode: branch_recovery
  max_nfev: 250
  selected_outages: 3
  outage_selection_min_recovery_segments: 4
  state_residual_weight: 1.25
  robust_residual_weight: 1.15
  fuel_residual_weight: 0.01
  smooth_residual_weight: 0.006
  control_regularization: 0.006
  multistart:
    enabled: true
    include_feedback: true
    include_zero: true
    include_bang_bang: true
    random_starts: 3
    low_amplitude_fraction: 0.35
    seed: 12345
