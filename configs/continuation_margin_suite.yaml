run:
  label: continuation_margin_suite
  output_subdir: continuation_margin_suite
  evidence_level: "continuous-backend continuation margin suite using direct multiple shooting warm starts; non-teacher catalog halo phase-shift targets"
benchmark:
  mu: 0.01215058560962404
  target_mode: catalog_halo_phase_shift
  transfer_time: 0.5
  phase_time: 0.3
  segments: 8
  substeps_per_segment: 4
  amax: 0.3
  steering:
    kr: 0.75
    kv: 1.45
objective:
  position_scale: 1.0
  velocity_scale: 0.35
  weights:
    nominal: 1.0
    robust_worst: 0.85
    robust_degradation: 0.55
    active_fraction: 0.08
    smoothness: 0.04
  thresholds:
    nominal_success: 0.09
    robust_success: 0.17
outages:
  block_lengths: [1]
suite:
  runtime_budget_seconds: 1200
  residual_weights:
    initial_weight: 10.0
    defect_weight: 1.0
    terminal_weight: 4.0
    branch_terminal_weight: 4.0
    branch_start_weight: 5.0
    control_weight: 0.01
    smooth_weight: 0.012
  groups:
    phase_continuation_all_single:
      purpose: "all one-segment outage masks at N=8; phase 0.2 is warm-started from phase 0.3 nominal controls"
      outage_lengths: [1]
      cases:
        - case_id: phase_all_single_p03_cold
          phase_time: 0.3
          transfer_time: 0.5
          amax: 0.3
          segments: 8
          selected_outages: all_configured_outage_masks
          max_nfev: 60
          warm_start_kind: cold
        - case_id: phase_all_single_p02_warm_from_p03
          phase_time: 0.2
          transfer_time: 0.5
          amax: 0.3
          segments: 8
          selected_outages: all_configured_outage_masks
          max_nfev: 100
          warm_start_kind: nominal_controls
          warm_start_from_case_id: phase_all_single_p03_cold
    two_segment_all_mask_diagnostic:
      purpose: "N=6 all-mask diagnostic over one- and two-segment outages; warm rows reuse phase 0.3 nominal controls"
      outage_lengths: [1, 2]
      cases:
        - case_id: two_segment_p03_cold
          phase_time: 0.3
          transfer_time: 0.5
          amax: 0.3
          segments: 6
          selected_outages: all_configured_outage_masks
          max_nfev: 60
          warm_start_kind: cold
        - case_id: two_segment_p04_warm_from_p03
          phase_time: 0.4
          transfer_time: 0.5
          amax: 0.3
          segments: 6
          selected_outages: all_configured_outage_masks
          max_nfev: 80
          warm_start_kind: nominal_controls
          warm_start_from_case_id: two_segment_p03_cold
        - case_id: two_segment_p02_warm_from_p03
          phase_time: 0.2
          transfer_time: 0.5
          amax: 0.3
          segments: 6
          selected_outages: all_configured_outage_masks
          max_nfev: 80
          warm_start_kind: nominal_controls
          warm_start_from_case_id: two_segment_p03_cold
experiments:
  seeds: [11]
  solver_true_budget: 12
  equal_total_budget: true
  qubo_train_samples: 12
  qubo_validation_fraction: 0.25
  top_refine_per_method: 1
  save_top_schedules: 3
solvers:
  random:
    samples: 12
  cem:
    iterations: 2
    batch_size: 6
    elite_fraction: 0.33
    smoothing: 0.65
  genetic:
    population: 8
    generations: 1
    elite: 2
    mutation_rate: 0.10
  true_sa:
    steps: 12
    temp0: 0.25
    temp_min: 0.01
  surrogate_sa:
    steps: 80
    candidates_to_evaluate: 12
    temp0: 0.35
    temp_min: 0.004
  qaoa:
    p: 1
    angle_trials: 4
    sample_count: 40
    candidates_to_evaluate: 12
baselines:
  all_windows_continuous:
    enabled: true
refinement:
  mode: multiple_shooting_branch_recovery
  solver_mode: bounded_projected_multiple_shooting
  max_nfev: 80
  selected_outages: all_configured_outage_masks
  outage_selection_min_recovery_segments: 1
  node_initialization: linear
  node_initialization_blend: 0.5
  nominal_first_homotopy: false
  nominal_first_nfev: 80
